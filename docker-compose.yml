version: "3.9"

services:
  admin:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 admin_server:app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - EMINO_BLOG_DIR=/app
      - EMINO_MAILDIR=/maildir
      - EMINO_EMAIL_LOG=/logs/email_processing.log
      - EMINO_SYNC_LOG=/logs/github-sync.log
    volumes:
      - .:/app
      - ./.dev/maildir:/maildir
      - ./.dev/logs:/logs

  hugo:
    image: klakegg/hugo:0.148.2-ext-alpine
    working_dir: /src
    command: server --bind 0.0.0.0 --baseURL http://localhost:1313 --appendPort=false
    ports:
      - "1313:1313"
    volumes:
      - .:/src
